[workspace]
db_path = "kesoku.db"
skills_dir = "skills"
sessions_dir = "sessions"

[agent]
llm = "gemini"
# Optional: List of custom system prompt file paths relative to agent working directory
# user_prompts = ["memory/USER.md"]
raw_llm_logs = true
# Threshold percentage of context window limit before warning is shown (default: 80.0)
compact_history_warning_threshold = 50.0
# Threshold for automatic in-place history compaction (if >1 raw tokens, if <1 window ratio, default: 0.8)
compact_history_threshold = 0.8



[gemini]
# https://ai.google.dev/gemini-api/docs/models
model_name = "gemini-3-flash-preview"
auth_mode = "vertex"
project_id = "your-gcp-project"
location = "global"
thinking_level = "medium" # 'minimal', 'low', 'medium', 'high', or comment out for model default

[claude]
# Available models on Vertex AI:
# - Claude Opus 4.7: "claude-opus-4-7"
# - Claude Sonnet 4.6: "claude-sonnet-4-6"
model_name = "claude-opus-4-7"
project_id = "your-gcp-project"
location = "us-east5"

[discord]
enabled = false
bot_token = "your-discord-bot-token"
chatbot_id = "discord"
# List of allowed Discord user IDs or usernames (if empty, all users can mention the bot)
# user_allowlist = ["1234567890"]

# Optional: Channel-specific configuration overrides
# [[discord.channels]]
# channels = ["channel_id", "channel_name"]
# llm = "claude"
# auto_thread = false

[google_chat]
enabled = false
chatbot_id = "google_chat"
project_id = "your-gcp-project"
topic_id = "your-gchat-topic"
subscription_id = "your-gchat-subscription"
credentials_json = "" # Optional: path to service account JSON file
impersonate_service_account = "" # Optional: target service account email to impersonate
# List of allowed Google Chat user resource names or emails
# user_allowlist = ["users/1234567890"]
# reaction_emoji = "👀" # Optional: Emoji to react with when receiving a user message

[wechat]
enabled = false
chatbot_id = "wechat"
account_id = "" # Filled automatically by 'kesoku wechat pair'
token = "" # Filled automatically by 'kesoku wechat pair'
base_url = "https://ilinkai.weixin.qq.com"
# Optional path to custom system prompt markdown file relative to agent working directory
# sys_prompt_file = "memory/wechat_prompt.md"

[shell]
enabled = true
use_shell = true
mode = "blocklist"
allowlist_patterns = [
    "^(echo|ls|pwd|cat|git|uv|grep|find|python|sed|awk)(\\s|$)",
]
blocklist_patterns = [
    "(\\b|^)(rm|sudo|shutdown|reboot|mkfs|dd|chmod|chown)(\\b|\\s|$)",
]
background_threshold_seconds = 300.0

[shell.env]
# CUSTOM_VAR = "value"
