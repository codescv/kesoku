[workspace]
db_path = "kesoku.db"
skills_dir = "skills"
sessions_dir = "sessions"

[agent]
llm = "gemini"
# Optional: List of custom system prompt file paths relative to agent working directory
# user_prompts = ["memory/USER.md"]

[agent.history]
max_turns = 30
pin_initial_turns = 3
pin_recent_turns = 10

[gemini]
# https://ai.google.dev/gemini-api/docs/models
model_name = "gemini-3-flash-preview"
auth_mode = "vertex"
project_id = "your-gcp-project"
location = "global"
thinking_level = "medium" # 'minimal', 'low', 'medium', 'high', or comment out for model default

[discord]
enabled = false
bot_token = "your-discord-bot-token"
chatbot_id = "discord"
# List of allowed Discord user IDs or usernames (if empty, all users can mention the bot)
# user_allowlist = ["1234567890"]
# List of Discord channel IDs or names where threads should not be automatically created
# no_auto_thread_channels = ["general", "1234567890"]

[shell]
enabled = true
use_shell = true
mode = "blocklist"
allowlist_patterns = [
    "^(echo|ls|pwd|cat|git|uv|grep|find|python|sed|awk)(\\s|$)",
]
blocklist_patterns = [
    "(\\b|^)(rm|sudo|shutdown|reboot|mkfs|dd|chmod|chown)(\\b|\\s|$)",
]

[shell.env]
# CUSTOM_VAR = "value"
